<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkoutAtlas Account</title>
  <style>
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .wrapper { max-width: 560px; margin: 32px auto; padding: 0 16px; }
    .header { background: #0f172a; border-radius: 10px 10px 0 0; padding: 20px 28px; }
    .logo-text { color: #ffffff; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-dot { color: #2081e2; }
    .card { background: #ffffff; padding: 32px 28px; border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; }
    .card h2 { margin: 0 0 12px; font-size: 20px; font-weight: 700; color: #0f172a; }
    .card p { margin: 0 0 14px; font-size: 15px; color: #475569; line-height: 1.6; }
    .detail-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px 16px; margin: 16px 0 24px; font-size: 14px; color: #334155; line-height: 1.7; }
    .btn { display: inline-block; margin-top: 8px; padding: 12px 28px; background: #2081e2; color: #ffffff; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: 600; }
    .footer { background: #f8fafc; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 10px 10px; padding: 16px 28px; text-align: center; font-size: 12px; color: #94a3b8; line-height: 1.6; }
    .footer a { color: #64748b; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="logo-text">Workout<span class="logo-dot">Atlas</span></div>
    </div>
    <div class="card">
      <h2>{{EVENT_TITLE}}</h2>
      <div class="detail-box">{{EVENT_DETAIL}}</div>
      <a href="{{CTA_URL}}" class="btn">Go to WorkoutAtlas</a>
    </div>
    <div class="footer">
      You are receiving this email because you have an account on WorkoutAtlas.<br>
      <a href="{{SETTINGS_URL}}">Manage notification preferences</a>
    </div>
  </div>
</body>
</html>
